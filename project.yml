name: mObywatel
options:
  bundleIdPrefix: pl.gov.mobywatel.clone
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"
    SWIFT_VERSION: "5.9"

packages:
  DesignSystem:
    path: .

targets:
  mObywatel:
    type: application
    platform: iOS
    sources:
      - path: App/mObywatel
    dependencies:
      - package: DesignSystem
        product: DesignSystem
    settings:
      base:
        INFOPLIST_FILE: App/mObywatel/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: pl.gov.mobywatel.clone
        MARKETING_VERSION: "4.63.0"
        CURRENT_PROJECT_VERSION: "17"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_CFBundleDisplayName: "mObywatel"
